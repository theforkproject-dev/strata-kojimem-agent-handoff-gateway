      - GATEWAY_TINFOIL_CONTAINER_NAME: "strata-kojimem-agent-handoff-gateway"
      - GATEWAY_TINFOIL_CONFIG_REPO: "theforkproject-dev/strata-kojimem-agent-handoff-gateway"
      - GATEWAY_TINFOIL_CONFIG_TAG: "v0.1.0-kojimem-gateway.1"
