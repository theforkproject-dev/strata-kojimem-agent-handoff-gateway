      - KOJIMEM_CONNECTOR_ID: "kojimem-agent-handoff"
      - KOJIMEM_CONNECTOR_LABEL: "Kojimem Agent Handoff"
      - KOJIMEM_AGENT_A_LABEL: "Conduit - Issuer Fraud Analyst"
      - KOJIMEM_AGENT_B_LABEL: "Sentinel - Network Correlator"
