    env:
      - HOST: "0.0.0.0"
      - PORT: "8080"
      - NODE_OPTIONS: "--dns-result-order=ipv4first"
      - STRATA_GATEWAY_KIND: "kojimem"
      - DATA_DIR: "/mnt/ramdisk/kojimem-agent-handoff"
      - PUBLIC_BASE_URL: "https://strata-kojimem-agent-handoff-gateway.amotivv.containers.tinfoil.dev"
