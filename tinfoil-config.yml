      - KOJIMEM_MAX_TTL: "1h"
      - KOJIMEM_DEFAULT_RECALL_TIER: "reasoning"
      - KOJIMEM_DEFAULT_ESTIMATED_EXPOSURE_USD: "25000"
      - KOJIMEM_L3_EXPOSURE_THRESHOLD_USD: "10000"
      - KOJIMEM_TIMEOUT_MS: "90000"
