","attestation_url":"https://strata-witness-poc-3.amotivv.containers.tinfoil.dev/.well-known/tinfoil-attestation","witness_epoch_id":"wit_epoch_tinfoil_poc_3_001","registry_epoch_id":"registry_epoch_tinfoil_poc_006","workflow_id":"agent-handoff.fraud-signal-exchange","registry_pointer_url":"https://d2oeah1vhl8c0o.cloudfront.net/registry/witness/current.json","registry_trust_anchors_url":"https://d2oeah1vhl8c0o.cloudfront.net/registry/witness/trust-anchors.json"}]'
      - L1_WITNESS_REGISTRY_POINTER_URL: "https://d2oeah1vhl8c0o.cloudfront.net/registry/witness/current.json"
      - L1_WITNESS_REGISTRY_TRUST_ANCHORS_URL: "https://d2oeah1vhl8c0o.cloudfront.net/registry/witness/trust-anchors.json"
      - TENANT_ID: "default"
      - OPERATOR_ID: "operator:amotivv-demo"
      - OPERATOR_ADMISSION_KEY_ID: "operator-admission:amotivv-demo"
    secrets:
      - MCP_SESSION_SECRET
      - KOJIMEM_MCP_CONSENT_PASSWORD_SHA256
      - OAUTH_DYNAMODB_AWS_ACCESS_KEY_ID
      - OAUTH_DYNAMODB_AWS_SECRET_ACCESS_KEY
      - CERTIFICATE_BUNDLE_AWS_ACCESS_KEY_ID
      - CERTIFICATE_BUNDLE_AWS_SECRET_ACCESS_KEY
      - GATEWAY_KEY_JSON
      - OPERATOR_ADMISSION_KEY_JSON
      - KOJIMEM_AGENT_A_PRIVATE_KEY
      - KOJIMEM_AGENT_B_PRIVATE_KEY
    command: ["node", "src/server.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: always

shim:
  upstream-port: 8080
  paths:
    - /health
    - /mcp
    - /certificates/*
    - /.well-known/*
    - /oauth/*
